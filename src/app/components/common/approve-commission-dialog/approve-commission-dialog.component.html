<h2 mat-dialog-title class="modal-header-title">
  Approve Commission Request
  <button mat-dialog-close class="modal-header-close-btn">
    <mat-icon>close</mat-icon>
  </button>
</h2>
<mat-dialog-content>
  <p class="m-b-16">
    Please choose the commission approval period for <strong>{{ data.shopName }}</strong>.
  </p>
  <div class="approval-date-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>From Month</mat-label>
      <input matInput [(ngModel)]="selectedFromMonth" [matDatepicker]="fromDatePicker" placeholder="Choose a month" readonly>
      <mat-datepicker-toggle matSuffix [for]="fromDatePicker"></mat-datepicker-toggle>
      <mat-datepicker #fromDatePicker startView="multi-year" (yearSelected)="chosenYearHandler($event)" (monthSelected)="chosenFromMonthHandler($event, fromDatePicker)" panelClass="month-picker"></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>To Month</mat-label>
      <input matInput [(ngModel)]="selectedToMonth" [matDatepicker]="toDatePicker" placeholder="Choose a month" readonly>
      <mat-datepicker-toggle matSuffix [for]="toDatePicker"></mat-datepicker-toggle>
      <mat-datepicker #toDatePicker startView="multi-year" (yearSelected)="chosenYearHandler($event)" (monthSelected)="chosenToMonthHandler($event, toDatePicker)" panelClass="month-picker"></mat-datepicker>
    </mat-form-field>
  </div>


  <div *ngIf="commissionTypeHistory.length > 0" class="table-responsive table-max-scroll example-container">
    <table mat-table [dataSource]="commissionTypeHistory" class="w-100 custom-table">

      <ng-container matColumnDef="fromDate">
        <th mat-header-cell *matHeaderCellDef>From Date</th>
        <td mat-cell *matCellDef="let element">{{ element.fromDate | date: 'dd/MM/yyyy' || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="toDate">
        <th mat-header-cell *matHeaderCellDef>To Date</th>
        <td mat-cell *matCellDef="let element">{{ element.toDate | date: 'dd/MM/yyyy' || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let element">Mobile Shop</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <div class="zero-records p-b-8" *ngIf="commissionTypeHistory.length == 0">
    <img src="/assets/images/landingpage/background/no-records.svg" />
    <span>No records found</span>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onApprove()" [disabled]="!canApprove">Approve</button>
</mat-dialog-actions>

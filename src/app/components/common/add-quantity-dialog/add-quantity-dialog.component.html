<h2 mat-dialog-title class="modal-header-title">Add Product Quantity
  <button mat-dialog-close class="modal-header-close-btn">
    <mat-icon>close</mat-icon>
  </button>
</h2>
<mat-dialog-content>
  <form [formGroup]="quantityForm" class="quantity-form m-t-16">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" required>
      <mat-error *ngIf="quantityForm.get('quantity')?.hasError('required')">
        Quantity is required
      </mat-error>
      <mat-error *ngIf="quantityForm.get('quantity')?.hasError('min')">
        Quantity must be at least 1
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="quantityForm.invalid" (click)="onSave()">Save</button>
</mat-dialog-actions>

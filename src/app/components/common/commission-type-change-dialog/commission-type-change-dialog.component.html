<h2 mat-dialog-title class="modal-header-title">Commission Type Change Request
    <button mat-dialog-close class="modal-header-close-btn">
        <mat-icon>close</mat-icon>
    </button>
</h2>
<mat-dialog-content>
    <form [formGroup]="commissionForm" class="commission-form m-t-16">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>From Date</mat-label>
            <input matInput formControlName="fromDate" [matDatepicker]="fromDatePicker" placeholder="Choose a Month"
                required />
            <mat-datepicker-toggle matIconSuffix [for]="fromDatePicker"></mat-datepicker-toggle>
            <mat-datepicker #fromDatePicker startView="year" (yearSelected)="chosenYearHandler($event)"
                (monthSelected)="chosenMonthHandler($event, fromDatePicker)" panelClass="month-picker">
            </mat-datepicker>
            <mat-error *ngIf="commissionForm.get('fromDate')?.hasError('required')">
                From date is required
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>To Date</mat-label>
            <input matInput formControlName="toDate" [matDatepicker]="toDatePicker" placeholder="Choose a Month"
                required />
            <mat-datepicker-toggle matIconSuffix [for]="toDatePicker"></mat-datepicker-toggle>
            <mat-datepicker #toDatePicker startView="year" (yearSelected)="chosenYearHandler($event)"
                (monthSelected)="choseToMonthHandler($event, toDatePicker)" panelClass="month-picker">
            </mat-datepicker>
            <mat-error *ngIf="commissionForm.get('toDate')?.hasError('required')">
                To date is required
            </mat-error>
        </mat-form-field>


        
        <mat-checkbox class="col-lg-12" formControlName="isMobileShop">Mobile Shop</mat-checkbox>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" [disabled]="commissionForm.invalid" (click)="onSave()">Save</button>
</mat-dialog-actions>

<h2 mat-dialog-title class="modal-header-title">
    {{ title }}
    <button mat-dialog-close class="modal-header-close-btn">
        <mat-icon>close</mat-icon>
    </button>
</h2>

<mat-dialog-content class="mat-typography" style="max-width: 600px">
    <div class="m-t-10">
        <div class="alert-block">
            <mat-icon color="warn" class="alert-icon">warning</mat-icon>
            <div class="alert-text">
                <p>{{ message }}</p>
                <p class="balance-value">£{{ amount | number: '1.2-2' }}</p>
            </div>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-raised-button color="primary" (click)="close()">OK</button>
</mat-dialog-actions>

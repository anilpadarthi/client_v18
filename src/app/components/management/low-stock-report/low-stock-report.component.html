<div class="page-title">
    <h1>Low Stock Report</h1>
    <span class="page-title__info"></span>
    <mat-card class="cardWithShadow theme-card">
        <mat-card-content>            

          
            <div *ngIf="productList?.length > 0" class="table-responsive table-max-scroll example-container">
                <table mat-table [dataSource]="productList" class="w-100 custom-table">

                    <ng-container matColumnDef="ProductName" sticky>
                        <th mat-header-cell *matHeaderCellDef>Product Name</th>
                        <td mat-cell *matCellDef="let element">
                            {{ element.productName }}
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="Quantity" sticky>
                        <th mat-header-cell *matHeaderCellDef>Quantity</th>
                        <td mat-cell *matCellDef="let element">
                            {{ element.quantity }}
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
                </table>
            </div>
            <div class="zero-records p-b-8" *ngIf="productList?.length == 0">
                <img src="/assets/images/landingpage/background/no-records.svg" />
                <span>No records found</span>
            </div>
        </mat-card-content>
    </mat-card>
</div>
